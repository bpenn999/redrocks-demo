name: Daily Medicare blog

# Publishes one new Sandy/SLC Medicare post per day.
# Option B from scripts/DAILY-BLOG.md (no MCP approval needed).
#
# By default this renders the site from whatever posts already exist. To make it
# fully autonomous, generate a post into ./draft.json before the render step —
# e.g. call the Claude API with the prompt in scripts/daily-blog-prompt.txt using
# an ANTHROPIC_API_KEY repo secret — then it will be added and committed.

on:
  schedule:
    - cron: '0 13 * * *'   # ~07:00 America/Denver
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/brindle-senior-insurance-site-yatszr
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # OPTIONAL: generate ./draft.json here (Claude API / your generator).
      # If draft.json exists, add it to the blog:
      - name: Add draft post (if present)
        run: |
          if [ -f draft.json ]; then
            node site/engine/add-post.js ./draft.json || true
            rm -f draft.json
          fi

      - name: Rebuild site
        run: node site/engine/render.js

      - name: Commit & push if changed
        run: |
          git config user.name "es-blog-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "Daily blog build ($(date -u +%F))"
            git push origin claude/brindle-senior-insurance-site-yatszr
          else
            echo "No changes to publish."
          fi
